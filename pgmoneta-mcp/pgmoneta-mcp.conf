[pgmoneta_mcp]
port = 6432
log_path = /var/log/pgmoneta/pgmoneta.log
log_level = info
log_type = file
log_line_prefix = %Y-%m-%d %H:%M:%S
log_mode = create
log_rotation_age = m

[pgmoneta]
host = 127.0.0.1
port = 5002

[pgmoneta_mcp_client]
url = http://localhost:6432/mcp

[inspector]
url = http://localhost:6432/mcp
timeout = 30

[llm]
provider = ollama
endpoint = http://localhost:11434
model = qwen2.5:3B
max_tool_rounds = 10

